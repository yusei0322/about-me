name: Deploy to GitHub Pages

# main への push でビルド→out/ を Pages に自動デプロイする
on:
  push:
    branches: [main]
  # Actions タブから手動実行も可能にする
  workflow_dispatch:

# GITHUB_TOKEN に Pages デプロイ用の権限を付与する
permissions:
  contents: read
  pages: write
  id-token: write

# 同時に走ったデプロイは古い方をキャンセルする（多重デプロイ防止）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # 1) ビルドして out/ をアーティファクトとしてアップロード
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build

      # GitHub Pages は Jekyll を通すため、先頭が _ のファイル/フォルダ
      # （Next.js の _next/）が無視されて CSS/JS が 404 になる。
      # .nojekyll を置いて Jekyll 処理を無効化する（必須）。
      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  # 2) アップロードしたアーティファクトを Pages にデプロイ
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
